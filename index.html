<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f6f7f9;
            color: #1f1f1f;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2f3440;
            color: #ffffff;
            padding: 44px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 64px 20px;
        }

        main p {
            font-size: 16px;
            line-height: 1.6;
            text-align: center;
            max-width: 620px;
            margin-bottom: 28px;
            color: #4a4f59;
        }

        a.support-button {
            text-decoration: none;
            background-color: #2f3440;
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            transition: opacity 0.2s ease;
        }

        a.support-button:hover {
            opacity: 0.85;
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 13px;
            color: #8a8f98;
        }
    </style>
</head>

<body>

    <header>
        <h1>Support</h1>
    </header>

    <main>
        <p>
            If you have any questions, feedback, or issues regarding the app,
            feel free to contact our support team. We usually respond as soon as possible.
        </p>

        <a class="support-button" href="mailto:emilsvetlichnyy@internet.ru">
            Contact Support
        </a>
    </main>

    <footer>
        © 2026 All rights reserved.
    </footer>

</body>
</html>
