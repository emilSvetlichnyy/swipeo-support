<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swipeo Support</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2em;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        main p {
            font-size: 1.2em;
            text-align: center;
            max-width: 600px;
            margin-bottom: 30px;
        }

        a.support-button {
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        a.support-button:hover {
            background-color: #45a049;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <h1>Swipeo Support</h1>
    </header>

    <main>
        <p>If you have any questions or issues with the app, please contact our support team. We will get back to you as soon as possible.</p>
        <a class="support-button" href="mailto:emilsvetlichnyy@internet.ru">Contact Support</a>
    </main>

    <footer>
        © 2026 Emil Svetlichnyi All rights reserved.
    </footer>
</body>
</html>
